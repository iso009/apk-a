name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build APK
      uses: kivy/buildozer-action@main
      with:
        command: android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lotto-apk
        path: bin/*.apk
    
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "bin/*.apk"
        tag: v1.0.0
        token: ${{ secrets.GITHUB_TOKEN }}
